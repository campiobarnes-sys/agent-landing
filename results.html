<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campio — Your Learning Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0b0f; --surface: #10121a; --surface2: #13151f; --border: #1e2030;
      --gold: #c9a84c; --gold-light: #e8c97a; --gold-glow: rgba(201,168,76,0.12);
      --text: #f0efe8; --muted: #6b6a72; --green: #4ade80;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; line-height: 1.6; }
    h1,h2,h3,h4 { font-family: 'Sora', sans-serif; }
    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      position: sticky; top: 0; z-index: 100;
      padding: 1.1rem 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10,11,15,0.95); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Sora', sans-serif; font-size: 1.2rem; font-weight: 800; color: var(--gold); }
    .nav-actions { display: flex; gap: 1rem; align-items: center; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.6rem 1.3rem; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: all 0.2s; border: none;
    }
    .btn-gold { background: var(--gold); color: #0a0b0f; }
    .btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); text-decoration: none; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-1px); text-decoration: none; }
    @media (max-width: 600px) { nav { padding: 1rem 1.25rem; } }

    /* EMAIL CAPTURE */
    .email-gate { text-align: center; }
    .email-gate h3 { font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .email-gate p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.25rem; line-height: 1.6; }
    .email-form { display: flex; gap: 0.5rem; max-width: 420px; margin: 0 auto 0.75rem; }
    .email-input {
      flex: 1; padding: 0.75rem 1rem; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }
    .email-input:focus { border-color: var(--gold); }
    .email-input::placeholder { color: var(--muted); }
    .email-submit {
      padding: 0.75rem 1.5rem; border-radius: 10px; border: none; cursor: pointer;
      background: var(--gold); color: #0a0b0f; font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 700; transition: all 0.2s; white-space: nowrap;
    }
    .email-submit:hover { background: var(--gold-light); transform: translateY(-1px); }
    .email-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .email-skip { font-size: 0.78rem; color: var(--muted); cursor: pointer; background: none; border: none; }
    .email-skip:hover { color: var(--text); }
    .email-error { color: #f87171; font-size: 0.82rem; margin-top: 0.4rem; }
    .pay-gate { text-align: center; }
    .pay-gate h3 { font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .pay-gate p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.25rem; line-height: 1.6; }
    @media (max-width: 500px) { .email-form { flex-direction: column; } }


    .container { max-width: 800px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }

    /* SKELETON / LOADING STATE */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* HEADER */
    .results-header { text-align: center; margin-bottom: 3rem; animation: slideUp 0.6s ease both; }
    .badge {
      display: inline-block; padding: 0.3rem 0.85rem; border-radius: 999px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 1.25rem;
    }
    .badge-gold { background: var(--gold-glow); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .badge-green { background: rgba(74,222,128,0.08); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
    .badge-muted { background: rgba(107,106,114,0.1); color: var(--muted); border: 1px solid var(--border); }
    .results-header h1 { font-size: clamp(1.8rem,4vw,2.8rem); font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.75rem; }
    .results-header p { color: var(--muted); max-width: 500px; margin: 0 auto; }

    /* STATS */
    .stats-row {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem;
      margin-bottom: 3rem; animation: slideUp 0.6s ease 0.1s both;
    }
    @media (max-width: 600px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.25rem; text-align: center;
    }
    .stat .num { font-family: 'Sora', sans-serif; font-size: 1.7rem; font-weight: 800; color: var(--gold); }
    .stat .label { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }

    /* MODULE CARDS */
    .modules { display: flex; flex-direction: column; gap: 1.25rem; }
    .module-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 2rem;
      animation: slideUp 0.5s ease both;
    }
    .module-card-header { display: flex; align-items: flex-start; gap: 1.25rem; margin-bottom: 1.5rem; }
    .module-number {
      font-family: 'Sora', sans-serif; font-size: 2rem; font-weight: 800; color: var(--gold);
      line-height: 1; flex-shrink: 0; width: 48px; text-align: center;
    }
    .module-meta { flex: 1; }
    .module-meta h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.5rem; }
    .module-desc { font-size: 0.88rem; color: var(--muted); margin-bottom: 0.5rem; line-height: 1.6; }
    .module-badges { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.4rem; }
    .badge-sm {
      padding: 0.2rem 0.6rem; border-radius: 999px;
      font-size: 0.7rem; font-weight: 600;
    }
    .badge-sm-gold { background: var(--gold-glow); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); }
    .badge-sm-muted { background: rgba(107,106,114,0.1); color: var(--muted); border: 1px solid var(--border); }
    .badge-sm-green { background: rgba(74,222,128,0.08); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }

    .module-section { margin-top: 1.25rem; }
    .module-section h4 {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem;
    }
    .project-list { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
    .project-list li {
      display: flex; align-items: flex-start; gap: 0.6rem;
      font-size: 0.88rem; color: var(--text); line-height: 1.5;
    }
    .project-list li::before { content: '→'; color: var(--gold); font-size: 0.8rem; flex-shrink: 0; margin-top: 0.1rem; }
    .resources-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .resource-chip {
      padding: 0.3rem 0.75rem; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      font-size: 0.78rem; color: var(--muted);
      display: flex; align-items: center; gap: 0.35rem;
    }
    .resource-type {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--gold); opacity: 0.8;
    }

    /* LOCK GATE */
    .lock-gate { position: relative; margin-top: 1.25rem; }
    .locked-blur { filter: blur(5px); pointer-events: none; opacity: 0.35; user-select: none; }
    .lock-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, rgba(10,11,15,0.9) 0%, rgba(10,11,15,0.7) 100%);
      border-radius: 18px; padding: 2.5rem; text-align: center; z-index: 10;
    }
    .lock-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .lock-overlay h3 { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.5rem; }
    .lock-overlay p { color: var(--muted); font-size: 0.9rem; max-width: 380px; margin-bottom: 1.75rem; line-height: 1.6; }
    .price-highlight { color: var(--gold); font-weight: 700; }

    /* ERROR STATE */
    .error-state {
      text-align: center; padding: 4rem 2rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px;
    }
    .error-state h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.75rem; }
    .error-state p { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Campio</a>
    <div class="nav-actions">
      <a href="/onboarding" class="btn btn-outline">Retake quiz</a>
      <a href="/dashboard" class="btn btn-outline">Dashboard</a>
      <button onclick="startCheckout('starter')" class="btn btn-gold" style="border:none;cursor:pointer;">Unlock full path →</button>
    </div>
  </nav>

  <div class="container" id="main-container">
    <!-- Rendered by JS -->
  </div>

  <script>
    const typeIcons = { course: '🎓', video: '▶', docs: '📄', article: '📝' };

    function renderPath(path) {
      const container = document.getElementById('main-container');

      const unlockedCount = Math.min(2, path.modules.length);
      const lockedModules = path.modules.slice(unlockedCount);
      const unlockedModules = path.modules.slice(0, unlockedCount);

      let html = `
        <div class="results-header">
          <div class="badge badge-gold">✦ Personalized for you</div>
          <h1>${path.headline}</h1>
          <p>${path.summary}</p>
        </div>

        <div class="stats-row">
          <div class="stat"><div class="num">${path.totalWeeks}</div><div class="label">Weeks total</div></div>
          <div class="stat"><div class="num">${path.modules.length}</div><div class="label">Modules</div></div>
          <div class="stat"><div class="num">${path.totalProjects}</div><div class="label">Projects</div></div>
          <div class="stat"><div class="num">${path.totalResources}+</div><div class="label">Resources</div></div>
        </div>

        <div class="modules">
      `;

      // Unlocked modules
      unlockedModules.forEach((mod, i) => {
        html += renderModuleCard(mod, true, i * 0.1);
      });

      // Lock gate
      if (lockedModules.length > 0) {
        html += `<div class="lock-gate"><div class="locked-blur">`;
        lockedModules.forEach((mod, i) => {
          html += renderModuleCard(mod, false, 0);
        });
        html += `</div>
          <div class="lock-overlay">
            <div id="email-gate-step" class="email-gate">
              <div class="lock-icon">📬</div>
              <h3>Save your path + get updates</h3>
              <p>Enter your email to save this path and get notified when new modules and resources drop.</p>
              <form class="email-form" onsubmit="submitEmail(event)">
                <input id="email-input" type="email" class="email-input" placeholder="you@example.com" required autocomplete="email" />
                <button type="submit" class="email-submit" id="email-submit-btn">Save path →</button>
              </form>
              <div id="email-error" class="email-error" style="display:none;"></div>
              <button class="email-skip" onclick="showPayGate()">Skip — just unlock now</button>
            </div>
            <div id="pay-gate-step" class="pay-gate" style="display:none;">
              <div class="lock-icon">🔒</div>
              <h3>Unlock your full path</h3>
              <p>Your remaining ${lockedModules.length} modules are ready — real projects, curated resources, everything you need to ship. <span class="price-highlight">One-time payment. Lifetime access.</span></p>
              <button onclick="startCheckout('starter')" class="btn btn-gold" style="font-size:1rem;padding:0.85rem 2.2rem;border:none;cursor:pointer;">Get full access — $19 →</button>
              <p style="margin-top:1rem;font-size:0.78rem;color:var(--muted);">30-day money-back guarantee · No subscription</p>
            </div>
          </div>
        </div>`;
      }

      html += `</div>`;
      container.innerHTML = html;
    }

    function renderModuleCard(mod, unlocked, delay) {
      const statusBadge = unlocked
        ? `<span class="badge-sm badge-sm-green">✓ Unlocked</span>`
        : `<span class="badge-sm badge-sm-muted">🔒 Locked</span>`;

      const projects = (mod.projects || []).map(p =>
        `<li>${p}</li>`
      ).join('');

      const resources = (mod.resources || []).map(r =>
        `<div class="resource-chip"><span class="resource-type">${r.type}</span> ${r.name}</div>`
      ).join('');

      return `
        <div class="module-card" style="animation-delay:${delay}s">
          <div class="module-card-header">
            <div class="module-number">${String(mod.number).padStart(2, '0')}</div>
            <div class="module-meta">
              <h3>${mod.title}</h3>
              ${mod.description ? `<p class="module-desc">${mod.description}</p>` : ''}
              <div class="module-badges">
                <span class="badge-sm badge-sm-gold">${mod.weeks} weeks · ${mod.hours}h</span>
                ${statusBadge}
              </div>
            </div>
          </div>
          ${projects ? `
          <div class="module-section">
            <h4>Projects</h4>
            <ul class="project-list">${projects}</ul>
          </div>` : ''}
          ${resources ? `
          <div class="module-section">
            <h4>Resources</h4>
            <div class="resources-list">${resources}</div>
          </div>` : ''}
        </div>
      `;
    }

    function renderError() {
      document.getElementById('main-container').innerHTML = `
        <div class="error-state">
          <div style="font-size:2.5rem;margin-bottom:1rem;">⚠️</div>
          <h2>No path found</h2>
          <p>It looks like you landed here directly. Take the quiz first and we'll build your personalized path.</p>
          <a href="/onboarding" class="btn btn-gold">Build my path →</a>
        </div>
      `;
    }

    // Load path from sessionStorage or localStorage fallback
    const stored = sessionStorage.getItem('campio_path') || localStorage.getItem('campio_path');
    if (stored) {
      try {
        renderPath(JSON.parse(stored));
      } catch (e) {
        renderError();
      }
    } else {
      renderError();
    }


    async function submitEmail(e) {
      e.preventDefault();
      const email = document.getElementById('email-input').value.trim();
      const btn = document.getElementById('email-submit-btn');
      const errEl = document.getElementById('email-error');

      if (!email) return;

      btn.disabled = true;
      btn.textContent = 'Saving...';
      errEl.style.display = 'none';

      try {
        const res = await fetch('/api/capture-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, source: 'results-gate' })
        });
        // Whether it succeeds or fails, move to pay gate
        localStorage.setItem('campio_email', email);
      } catch(e) {}

      showPayGate();
    }

    function showPayGate() {
      const eg = document.getElementById('email-gate-step');
      const pg = document.getElementById('pay-gate-step');
      if (eg) eg.style.display = 'none';
      if (pg) pg.style.display = 'block';
    }

    // If email already captured, skip to pay gate
    if (localStorage.getItem('campio_email')) {
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(showPayGate, 100);
      });
    }

    async function startCheckout(plan) {
      try {
        const res = await fetch('/api/checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ plan })
        });
        const data = await res.json();
        if (data.url) window.location.href = data.url;
        else alert('Something went wrong. Please try again.');
      } catch(e) {
        alert('Something went wrong. Please try again.');
      }
    }

    // Unlock full path if returning from successful payment
    if (localStorage.getItem('campio_unlocked') === 'true') {
      document.querySelectorAll('.lock-gate').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.locked-blur').forEach(el => {
        el.style.filter = 'none';
        el.style.pointerEvents = 'auto';
        el.style.opacity = '1';
      });
    }
  </script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
