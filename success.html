<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campio — You're in!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0b0f; --surface: #10121a; --border: #1e2030;
      --gold: #c9a84c; --gold-light: #e8c97a; --gold-glow: rgba(201,168,76,0.12);
      --text: #f0efe8; --muted: #6b6a72; --green: #4ade80;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    h1, h2, h3 { font-family: 'Sora', sans-serif; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 3rem 2.5rem; max-width: 480px; width: 100%;
      animation: slideUp 0.6s ease both;
    }
    .icon { font-size: 3.5rem; margin-bottom: 1.5rem; }
    .card h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.75rem; }
    .card p { color: var(--muted); font-size: 0.95rem; line-height: 1.7; margin-bottom: 2rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.85rem 2rem; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700;
      text-decoration: none; transition: all 0.2s; border: none; cursor: pointer;
      width: 100%; margin-bottom: 0.75rem;
    }
    .btn-gold { background: var(--gold); color: #0a0b0f; }
    .btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .loading { color: var(--muted); font-size: 0.9rem; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="card" id="card">
    <div class="loading">Confirming your payment...</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");

    async function verify() {
      const card = document.getElementById("card");

      if (!sessionId) {
        card.innerHTML = `<div class="icon">⚠️</div><h1>Something went wrong</h1><p>No session found.</p><a href="/pricing" class="btn btn-outline">Back to pricing</a>`;
        return;
      }

      try {
        const res = await fetch("/api/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId })
        });
        const data = await res.json();

        if (data.success) {
          // Unlock full path in localStorage
          localStorage.setItem("campio_unlocked", "true");
          localStorage.setItem("campio_plan", data.plan || "starter");

          card.innerHTML = `
            <div class="icon">🎉</div>
            <h1>You're in!</h1>
            <p>Your full learning path is unlocked. All 5 modules, every project, every resource — yours forever.</p>
            <a href="/results" class="btn btn-gold">View my full path →</a>
            <a href="/dashboard" class="btn btn-outline">Go to dashboard</a>
          `;
        } else {
          card.innerHTML = `<div class="icon">⚠️</div><h1>Payment not confirmed</h1><p>If you completed payment, please wait a moment and refresh.</p><a href="/pricing" class="btn btn-outline">Back to pricing</a>`;
        }
      } catch (e) {
        card.innerHTML = `<div class="icon">⚠️</div><h1>Something went wrong</h1><p>Please contact us if you were charged.</p><a href="/pricing" class="btn btn-outline">Back to pricing</a>`;
      }
    }

    verify();
  </script>
</body>
</html>
